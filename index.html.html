<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHM Simulator (Traditional Web)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>SHM Simulator (HTML/JS)</h2>
        
        <div class="controls">
            <div class="control-group">
                <label for="amp">Amplitude (A): <span id="ampVal">2.0</span></label>
                <input type="range" id="amp" min="0.5" max="4.0" step="0.1" value="2.0">
            </div>
        </div>
        
        <canvas id="simCanvas" width="400" height="250"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
